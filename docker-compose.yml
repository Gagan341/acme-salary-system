services:
  mysql:
    image: mysql:8.0
    container_name: acme_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: acme_salary
      MYSQL_USER: acme
      MYSQL_PASSWORD: acme_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uacme", "-pacme_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: acme_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://acme:acme_password@mysql:3306/acme_salary
      CORS_ORIGINS: http://localhost,http://localhost:5173,http://localhost:3000
      SEED_COUNT: "10000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Browser talks to the backend on the host's published port.
        VITE_API_URL: http://localhost:8000/api
    container_name: acme_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
